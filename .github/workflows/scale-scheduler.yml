name: Scale Scheduler

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  run-scale-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Call scale generation API
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          curl -X POST https://central-connect.vercel.app/api/scales/generate/scheduled-run \
            -H "Content-Type: application/json" \
            -H "x-internal-api-key: $INTERNAL_API_KEY" \
            -d '{"lookaheadDays": 7}'